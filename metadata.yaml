name: metacontroller-operator
description: |
  Metacontroller is an add-on for Kubernetes to make it easier to write and deploy custom controllers,
  reducing the need for boilerplate code.

  https://github.com/metacontroller/metacontroller
docs: https://discourse.charmhub.io/t/8235
assumes:
  - juju >= 2.9
summary: An add-on for Kubernetes to write and deploy custom controllers from simple scripts
provides:
  metrics-endpoint:
    interface: prometheus_scrape
  grafana-dashboard:
    interface: grafana_dashboard
  provide-cmr-mesh:
    interface: cross_model_mesh
    description: |
      Access a cross-model application from catalogue via the service mesh.
      This relation provides additional data required by the service mesh to enforce cross-model authorization policies.
requires:
  service-mesh:
    limit: 1
    interface: service_mesh
    description: |
      Subscribe this charm into a service mesh to enforce authorization policies.
  require-cmr-mesh:
    interface: cross_model_mesh
    description: |
      Allow a cross-model application access to catalogue via the service mesh.
      This relation provides additional data required by the service mesh to enforce cross-model authorization policies.
charm-user: non-root
